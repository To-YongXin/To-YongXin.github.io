<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story - To YongXin</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050505;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #fff;
        }
        canvas {
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        .content-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .chapter {
            position: absolute;
            opacity: 0; transform: translateY(20px);
            transition: all 1.5s ease-in-out;
            pointer-events: none; /* 隐藏时不可点击 */
            width: 80%; max-width: 600px;
        }
        .chapter.active {
            opacity: 1; transform: translateY(0);
            pointer-events: auto;
        }
        h1 { color: #ff99aa; font-weight: 300; letter-spacing: 2px; }
        p { line-height: 1.8; color: #eee; font-size: 1.1rem; }
        
        button {
            background: transparent; border: 1px solid #ff99aa; color: #ff99aa;
            padding: 10px 30px; font-size: 1rem; border-radius: 20px;
            cursor: pointer; transition: all 0.3s; margin-top: 30px;
        }
        button:hover {
            background: #ff99aa; color: #050505;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <!-- <audio id="bgm" src="music.mp3" loop></audio> -->
    <audio id="bgm" src="music.mp3" loop preload="auto"></audio>

    <div class="content-container">
        <div id="chap-0" class="chapter active">
            <h1>我们的故事</h1>
            <p>准备好听听我的心里话了吗？</p>
            <button onclick="startStory()">点击开启</button>
        </div>

        <div id="chap-1" class="chapter">
            <h1>初遇</h1>
            <p>2026年3月14日，那是一个特别的日子。<br>在这浩瀚的人海里，很高兴能遇见你，谭咏馨。</p>
            <button onclick="nextChapter(2)">下一页</button>
        </div>

        <div id="chap-2" class="chapter">
            <h1>初见</h1>
            <p>初次见面的场景依然历历在目。<br>（这里可以替换成你们当时见面的具体细节和你的感受）</p>
            <button onclick="nextChapter(3)">下一页</button>
        </div>

        <div id="chap-3" class="chapter">
            <h1>初识</h1>
            <p>随着一点点的了解，我发现了你身上那么多闪光的地方。<br>（这里可以写写你对她性格、爱好的欣赏）</p>
            <button onclick="nextChapter(4)">下一页</button>
        </div>

        <div id="chap-4" class="chapter">
            <h1>一些心里话</h1>
            <p>时间虽然不长，但有些话我想对你说。<br>未来的日子，希望能与你慢慢走，慢慢看。<br>To YongXin.</p>
            </div>
    </div>

    <script>
        // ==========================================
        // UI 与 音乐控制逻辑
        // ==========================================
        let currentChapter = 0;
        const bgm = document.getElementById('bgm');

        // function startStory() {
        //     // 播放音乐
        //     bgm.volume = 0.5; // 设置音量为 50%
        //     bgm.play().catch(e => console.log("音频播放被拦截，请确保已交互", e));
        //     nextChapter(1);
        // }
        
        function startStory() {
            // 确保音频被正确加载和触发
            bgm.volume = 0.5; 
            
            // 使用 Promise 强制捕获播放状态
            let playPromise = bgm.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // 播放成功，进入下一章
                    console.log("音乐播放成功！");
                    nextChapter(1);
                }).catch(error => {
                    // 如果被浏览器拦截，依然允许进入下一章，但控制台会报错
                    console.log("手机浏览器拦截了自动播放:", error);
                    nextChapter(1);
                    // 备用方案：给整个页面加一个一次性的触摸监听，只要屏幕任何地方被摸一下就强行播放
                    document.body.addEventListener('touchstart', function() {
                        bgm.play();
                    }, { once: true });
                });
            } else {
                nextChapter(1);
            }
        }

        function nextChapter(chapIndex) {
            // 隐藏当前章节
            document.getElementById(`chap-${currentChapter}`).classList.remove('active');
            // 显示下一章节
            currentChapter = chapIndex;
            document.getElementById(`chap-${currentChapter}`).classList.add('active');
            
            // 改变粒子物理状态
            particleState = currentChapter;

           if (particleState === 3) {
                // 进入“初识”：不再爆炸散开，而是赋予一个统一、极其缓慢的“同向”漂流速度
                for (let i = 0; i < particles.length; i++) {
                    particles[i].vx = Math.random() * 0.3 + 0.1; // 微微向右游动
                    particles[i].vy = (Math.random() - 0.5) * 0.3; // 上下微微浮动
                }
            } else if (particleState === 4) {
                // 进入“心里话”：化作落雪（调低初始下落和水平飘动的速度）
                for (let i = 0; i < particles.length; i++) {
                    particles[i].vx = (Math.random() - 0.5) * 0.3; // 减弱水平风力
                    particles[i].vy = Math.random() * 0.5 + 0.2;   // 下落速度降为原来的约一半
                }
            }
        }

        // ==========================================
        // 轻量级 Canvas 2D 粒子过渡动画
        // ==========================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let particleState = 0; // 对应 0,1,2,3,4 阶段

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.baseSize = Math.random() * 2 + 0.5;
                this.color = `rgba(255, 153, 170, ${Math.random() * 0.5 + 0.3})`;
            }

            update() {
                // 根据不同阶段，应用不同的物理运动规则
                if (particleState === 0 || particleState === 1) {
                    // 初遇：萤火虫自由游荡
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                } 
                else if (particleState === 2) {
                    // 初见：过阻尼聚焦 (不旋转，极其缓慢地向中心靠拢，带有呼吸感)
                    const dx = width / 2 - this.x;
                    const dy = height / 2 - this.y;
                    
                    // 极弱的向心力
                    this.vx += dx * 0.00002;
                    this.vy += dy * 0.00002;
                    
                    // 大阻力，确保运动极其平缓，不会越过中心点
                    this.vx *= 0.90;
                    this.vy *= 0.90;

                    // 加上一点微弱的随机游走，看起来像温柔的呼吸，而不是死板的移动
                    this.x += this.vx + (Math.random() - 0.5) * 0.25;
                    this.y += this.vy + (Math.random() - 0.5) * 0.25;
                }
                else if (particleState === 3) {
                    // 初识：同频共振，极其平缓地向一个方向流淌
                    this.x += this.vx;
                    this.y += this.vy;
                    // 无缝穿越边界，营造源源不断的宁静感
                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                }
                else if (particleState === 4) {
                    // 心里话：化作极其温柔的落雪
                    this.y += Math.abs(this.vy) * 0.6; // 大幅降低下落的乘数（原为 1.5）
                    this.x += Math.sin(this.y * 0.02) * 0.3; // 摇摆幅度变小，频率稍微变慢
                    if (this.y > height) {
                        this.y = -10; 
                        this.x = Math.random() * width;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.baseSize, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // 初始化粒子
        const particleCount = 150;
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // 动画主循环
        function animate() {
            // 使用半透明黑色填充，产生拖尾效果
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();


               
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
