<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Our Story</title>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'PingFang SC', sans-serif;
        }
        .content {
            text-align: center;
            animation: fadeIn 3s ease-in;
        }
        h1 { color: #ff99aa; font-weight: 300; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>故事的下一章</h1>
        <p>页面正在施工中，敬请期待...</p>
        </div>
</body>
</html>
