<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - To YongXin</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050505;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        canvas {
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        .menu-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            animation: fadeIn 2s ease-in-out;
        }
        h1 {
            color: #ff99aa; font-weight: 300; letter-spacing: 4px;
            margin-bottom: 50px; font-size: 2rem;
            text-shadow: 0 0 10px rgba(255, 153, 170, 0.5);
        }
        .menu-list {
            display: flex; flex-direction: column; gap: 25px; width: 80%; max-width: 300px;
        }
        .menu-item {
            text-decoration: none; color: #ff99aa; font-size: 1.1rem;
            padding: 15px 0; text-align: center; border: 1px solid rgba(255, 153, 170, 0.5);
            border-radius: 30px; transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px); letter-spacing: 2px;
        }
        .menu-item:hover {
            background: rgba(255, 153, 170, 0.2);
            border-color: #ff99aa;
            box-shadow: 0 0 20px rgba(255, 153, 170, 0.4);
            transform: scale(1.05);
        }
        .menu-item.disabled {
            color: #666; border-color: #333; background: transparent;
            cursor: not-allowed; text-shadow: none; letter-spacing: 4px;
        }
        .menu-item.disabled:hover {
            transform: none; box-shadow: none; border-color: #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="menu-container">
        <h1>我们的故事</h1>
        <div class="menu-list">
            <a href="page2.html" class="menu-item">第一章 故事的开始</a>
            <a href="page3.html" class="menu-item">第二章 第一次约会</a>
            <a href="#" class="menu-item disabled">未完待续……</a>
        </div>
    </div>

    <script>
        // 索引页极简星空动画
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.2,
                vy: (Math.random() - 0.5) * 0.2,
                size: Math.random() * 1.5 + 0.5
            });
        }

        function animate() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 153, 170, 0.5)';
            
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
